# Model Parameters
model:
  name: "all-MiniLM-L6-v2"
  embedding_dim: 384
  similarity_metric: "cosine"
  confidence_threshold: 0.7

# Data Preprocessing Parameters
preprocessing:
  max_length: 512
  min_samples_per_category: 10
  test_size: 0.2
  val_size: 0.1
  random_state: 42

# Feature Engineering Parameters
feature_engineering:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 32

# Training Parameters
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  hidden_dim: 256
  dropout: 0.3
  early_stopping_patience: 5
  weight_decay: 0.0001
  
# Evaluation Parameters
evaluation:
  threshold: 0.5
  top_k: 3
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
  min_accuracy: 0.85
  min_f1_score: 0.80

# Drift Detection Parameters
drift_detection:
  threshold: 0.05
  window_size: 100
  detection_method: "ks_test"  # Kolmogorov-Smirnov test
  check_frequency_hours: 24
  
# Retraining Triggers
retraining:
  correction_rate_threshold: 0.15  # Trigger if >15% predictions corrected
  drift_detected: true
  performance_degradation_threshold: 0.10  # 10% drop in accuracy
  min_samples_for_retraining: 50
  
# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  timeout: 300
  max_upload_size_mb: 10
  rate_limit_per_minute: 100
  
# MLflow
mlflow:
  tracking_uri: "http://mlflow:5000"
  experiment_name: "ticket_classification"
  artifact_location: "./mlruns"
  
# Monitoring
monitoring:
  prometheus_port: 9090
  grafana_port: 3001
  metrics_update_interval_seconds: 60
  alert_error_rate_threshold: 0.05
  alert_latency_threshold_ms: 500
  
# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

